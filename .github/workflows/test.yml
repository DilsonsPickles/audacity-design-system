name: Test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Type check packages/components
        run: npx tsc --noEmit
        working-directory: packages/components

      - name: Type check apps/sandbox
        run: npx tsc --noEmit
        working-directory: apps/sandbox

      - name: Test @dilsonspickles/components
        run: pnpm --filter @dilsonspickles/components test

      - name: Test @audacity-ui/sandbox
        run: pnpm --filter @audacity-ui/sandbox test

      - name: Check any
        run: node scripts/check-any.mjs
